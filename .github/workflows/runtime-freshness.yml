name: Runtime dependency freshness

on:
  workflow_dispatch:
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - run: ./packaging/check-upstream.sh
