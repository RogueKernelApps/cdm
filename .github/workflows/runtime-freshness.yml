name: Runtime dependency freshness

on:
  workflow_dispatch:
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: ./packaging/check-upstream.sh
