name: Production release composition

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  artifact-metadata: write
  contents: read
  id-token: write

jobs:
  preflight:
    name: Validate release revision
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Match release tag to Cargo version
        if: github.event_name == 'push'
        working-directory: rust
        run: |
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          expected="v$version"
          if [[ "$GITHUB_REF_TYPE" != tag || "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "release tag $GITHUB_REF_NAME does not match Cargo version $expected" >&2
            exit 1
          fi

  compose:
    name: ${{ matrix.name }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS AArch64 production package
            runner: '["self-hosted","macOS","ARM64","cdm-release"]'
            artifact: release-macos-aarch64
            target: aarch64-apple-darwin
            guest_target: aarch64-unknown-linux-musl
          - name: Linux x86_64 production package
            runner: '"ubuntu-22.04"'
            artifact: release-linux-x86_64
            target: x86_64-unknown-linux-gnu
            guest_target: x86_64-unknown-linux-musl
          - name: Linux AArch64 production package
            runner: '"ubuntu-22.04-arm"'
            artifact: release-linux-aarch64
            target: aarch64-unknown-linux-gnu
            guest_target: aarch64-unknown-linux-musl
    runs-on: ${{ fromJSON(matrix.runner) }}
    defaults:
      run:
        working-directory: rust
    env:
      CARGO_HOME: /tmp/cdm-cargo-home-${{ github.run_id }}-${{ matrix.target }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: 1.90.0
          components: clippy,rustfmt
          targets: ${{ matrix.guest_target }}
      - name: Install Linux release build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bubblewrap \
            clang \
            libclang-dev \
            lld \
            make \
            musl-tools \
            patchelf \
            pkg-config \
            xz-utils
      - name: Enable hosted x86_64 KVM acceptance
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          test -c /dev/kvm
          sudo chown "$(id -u):$(id -g)" /dev/kvm
          sudo chmod 0600 /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
      - name: Prepare ephemeral macOS signing keychain
        if: runner.os == 'macOS'
        env:
          CDM_CERTIFICATE_P12: ${{ secrets.CDM_CERTIFICATE_P12 }}
          CDM_CERTIFICATE_PASSWORD: ${{ secrets.CDM_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$CDM_CERTIFICATE_P12"
          test -n "$CDM_CERTIFICATE_PASSWORD"
          keychain="$RUNNER_TEMP/cdm-signing.keychain-db"
          certificate="$RUNNER_TEMP/cdm-signing.p12"
          keychain_password="cdm-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          keep_keychain=0
          cleanup_signing_setup() {
            command -p rm -f -- "$certificate"
            if [[ "$keep_keychain" -eq 0 && -e "$keychain" ]]; then
              security delete-keychain "$keychain" \
                || command -p rm -f -- "$keychain"
            fi
          }
          trap cleanup_signing_setup EXIT
          printf '%s' "$CDM_CERTIFICATE_P12" | /usr/bin/base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$CDM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s "$keychain"
          {
            printf 'CDM_SIGNING_KEYCHAIN=%s\n' "$keychain"
            printf 'CDM_SIGNING_KEYCHAIN_PASSWORD=%s\n' "$keychain_password"
          } >> "$GITHUB_ENV"
          keep_keychain=1
      - name: Verify macOS signing access
        if: runner.os == 'macOS'
        env:
          CDM_CODESIGN_IDENTITY: ${{ secrets.CDM_CODESIGN_IDENTITY }}
        run: |
          probe="$RUNNER_TEMP/cdm-codesign-probe"
          cleanup_probe() {
            case "$probe" in
              "$RUNNER_TEMP"/cdm-codesign-probe) command -p rm -f -- "$probe" ;;
              *) exit 1 ;;
            esac
          }
          trap cleanup_probe EXIT
          security unlock-keychain \
            -p "$CDM_SIGNING_KEYCHAIN_PASSWORD" \
            "$CDM_SIGNING_KEYCHAIN"
          cp /usr/bin/true "$probe"
          codesign --force --timestamp --sign "$CDM_CODESIGN_IDENTITY" "$probe"
          codesign --verify --strict "$probe"
      - name: Verify packaging metadata
        run: bash packaging/tests.sh
      - name: Acquire exact Alpine corresponding source
        run: ./packaging/prepare-alpine-sources-container.sh
      - name: Compose production release
        env:
          CDM_CODESIGN_IDENTITY: ${{ runner.os == 'macOS' && secrets.CDM_CODESIGN_IDENTITY || '' }}
          CDM_NOTARY_PROFILE: ${{ runner.os == 'macOS' && secrets.CDM_NOTARY_PROFILE || '' }}
        run: |
          source packaging/versions.env
          export CDM_ALPINE_SOURCE_DIR="$PWD/target/alpine-corresponding-source-$ALPINE_VERSION"
          ./packaging/package.sh release
      - name: Verify release set
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: |
          target=$(rustc -vV | awk '/^host:/ {print $2}')
          test "$target" = "$EXPECTED_TARGET"
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          ./packaging/package.sh verify "target/dist/cdm-$version-$target" "$target"
          (
            cd target/dist
            for checksum in *.sha256; do
              if command -v shasum >/dev/null 2>&1; then
                shasum -a 256 -c "$checksum"
              else
                sha256sum -c "$checksum"
              fi
            done
          )
          python3 - <<'PY'
          import json
          from pathlib import Path
          documents = list(Path("target/dist").glob("*.provenance.intoto.json"))
          assert len(documents) == 1, documents
          statement = json.loads(documents[0].read_text(encoding="utf-8"))
          parameters = statement["predicate"]["buildDefinition"]["internalParameters"]
          assert parameters["toolchain"]
          assert set(parameters["evidenceDigests"]) == {
              "SBOM.spdx.json",
              "guest-init.provenance.json",
          }
          PY
      - name: Run exact target-native package acceptance
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          target=$(rustc -vV | awk '/^host:/ {print $2}')
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          package="$PWD/target/dist/cdm-$version-$target"
          test -x "$package/bin/cdm"
          journey_root=$(mktemp -d "${RUNNER_TEMP:-/tmp}/cdm-release-journey.XXXXXX")
          relocated="$journey_root/relocated package with spaces"
          cp -R "$package" "$relocated"
          "$relocated/bin/cdm" --no-proxy --vm uname -s | grep -qx Linux

          installed="$journey_root/installed prefix with spaces"
          "$relocated/install.sh" install "$installed"
          "$relocated/install.sh" verify "$installed"
          "$installed/bin/cdm" --no-proxy --vm uname -s | grep -qx Linux
          "$relocated/install.sh" uninstall "$installed"

          CDM="$relocated/bin/cdm" \
            CDM_REQUIRE_NATIVE=1 \
            CDM_REQUIRE_VM=1 \
            CDM_OCI_SMOKE_TESTS=1 \
            CDM_OCI_TESTS=0 \
            CDM_AI_TESTS=0 \
            CDM_COMPAT_TESTS=0 \
            ./tests/integration.sh
      - name: Cryptographically attest exact release outputs
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            rust/target/dist/*.tar.gz
            rust/target/dist/*.provenance.intoto.json
            rust/target/dist/*.sha256
          create-storage-record: ${{ github.repository_visibility == 'public' }}
      - name: Preserve Sigstore attestation bundle
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          test -f "$BUNDLE_PATH"
          target=$(rustc -vV | awk '/^host:/ {print $2}')
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          cp "$BUNDLE_PATH" "target/dist/cdm-$version-$target.sigstore.jsonl"
      - name: Upload exact release outputs
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rust/target/dist/*.tar.gz
            rust/target/dist/*.sha256
            rust/target/dist/*.provenance.intoto.json
            rust/target/dist/*.notarization.json
            rust/target/dist/*.sigstore.jsonl
          if-no-files-found: error
          retention-days: 14
      - name: Upload Linux AArch64 release candidate
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-linux-aarch64-release
          path: |
            rust/target/dist/*.tar.gz
            rust/target/dist/*.sha256
            rust/target/dist/*.provenance.intoto.json
          if-no-files-found: error
          retention-days: 1
      - name: Upload compact Linux AArch64 runtime candidate
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-linux-aarch64-runtime
          path: |
            rust/target/dist/cdm-*-aarch64-unknown-linux-gnu.tar.gz
            rust/target/dist/cdm-*-aarch64-unknown-linux-gnu.tar.gz.sha256
            !rust/target/dist/cdm-vm-sources-*
          if-no-files-found: error
          retention-days: 1
      - name: Cleanup release workspace
        if: always()
        working-directory: /tmp
        run: |
          target_path="$GITHUB_WORKSPACE/rust/target"
          cargo_home="$CARGO_HOME"
          case "$target_path" in
            "$GITHUB_WORKSPACE"/rust/target) command -p rm -rf -- "$target_path" ;;
            *) echo "refusing unsafe target cleanup: $target_path" >&2; exit 1 ;;
          esac
          case "$cargo_home" in
            /tmp/cdm-cargo-home-"$GITHUB_RUN_ID"-*) command -p rm -rf -- "$cargo_home" ;;
            *) echo "refusing unsafe Cargo cleanup: $cargo_home" >&2; exit 1 ;;
          esac
          for journey in "$RUNNER_TEMP"/cdm-release-journey.*; do
            [[ -d "$journey" ]] || continue
            case "$journey" in
              "$RUNNER_TEMP"/cdm-release-journey.*) command -p rm -rf -- "$journey" ;;
              *) echo "refusing unsafe journey cleanup: $journey" >&2; exit 1 ;;
            esac
          done
          if [[ -n "${CDM_SIGNING_KEYCHAIN:-}" ]]; then
            case "$CDM_SIGNING_KEYCHAIN" in
              "$RUNNER_TEMP"/cdm-signing.keychain-db)
                security delete-keychain "$CDM_SIGNING_KEYCHAIN" \
                  || command -p rm -f -- "$CDM_SIGNING_KEYCHAIN"
                ;;
              *) echo "refusing unsafe signing-keychain cleanup" >&2; exit 1 ;;
            esac
          fi

  accept-linux-aarch64:
    name: Linux AArch64 target-native acceptance
    needs: compose
    runs-on: ${{ fromJSON('["self-hosted","Linux","ARM64","cdm-release"]') }}
    outputs:
      runtime-sha256: ${{ steps.accept.outputs.runtime-sha256 }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Download exact Linux AArch64 candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-linux-aarch64-runtime
          path: rust/target/dist
      - name: Verify and extract exact candidate
        run: |
          (
            cd target/dist
            for checksum in *.sha256; do
              sha256sum -c "$checksum"
            done
          )
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          archive="target/dist/cdm-$version-aarch64-unknown-linux-gnu.tar.gz"
          test -f "$archive"
          tar -xzf "$archive" -C target/dist
          ./packaging/package.sh verify-runtime \
            "target/dist/cdm-$version-aarch64-unknown-linux-gnu" \
            aarch64-unknown-linux-gnu
      - name: Run exact target-native package acceptance
        id: accept
        run: |
          version=$(awk -F '"' '/^version =/ {print $2; exit}' Cargo.toml)
          package="$PWD/target/dist/cdm-$version-aarch64-unknown-linux-gnu"
          archive="$package.tar.gz"
          test -x "$package/bin/cdm"
          printf 'runtime-sha256=%s\n' "$(sha256sum "$archive" | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          journey_root=$(mktemp -d "${RUNNER_TEMP:-/tmp}/cdm-release-journey.XXXXXX")
          relocated="$journey_root/relocated package with spaces"
          cp -R "$package" "$relocated"
          "$relocated/bin/cdm" --no-proxy --vm uname -s | grep -qx Linux

          installed="$journey_root/installed prefix with spaces"
          "$relocated/install.sh" install "$installed"
          "$relocated/install.sh" verify "$installed"
          "$installed/bin/cdm" --no-proxy --vm uname -s | grep -qx Linux
          "$relocated/install.sh" uninstall "$installed"

          CDM="$relocated/bin/cdm" \
            CDM_REQUIRE_NATIVE=1 \
            CDM_REQUIRE_VM=1 \
            CDM_OCI_SMOKE_TESTS=1 \
            CDM_OCI_TESTS=0 \
            CDM_AI_TESTS=0 \
            CDM_COMPAT_TESTS=0 \
            ./tests/integration.sh
      - name: Cleanup Linux AArch64 acceptance workspace
        if: always()
        working-directory: /tmp
        run: |
          target_path="$GITHUB_WORKSPACE/rust/target"
          case "$target_path" in
            "$GITHUB_WORKSPACE"/rust/target) command -p rm -rf -- "$target_path" ;;
            *) echo "refusing unsafe target cleanup: $target_path" >&2; exit 1 ;;
          esac
          for journey in "$RUNNER_TEMP"/cdm-release-journey.*; do
            [[ -d "$journey" ]] || continue
            case "$journey" in
              "$RUNNER_TEMP"/cdm-release-journey.*) command -p rm -rf -- "$journey" ;;
              *) echo "refusing unsafe journey cleanup: $journey" >&2; exit 1 ;;
            esac
          done

  finalize-linux-aarch64:
    name: Attest accepted Linux AArch64 outputs
    needs: [compose, accept-linux-aarch64]
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Download accepted Linux AArch64 candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-linux-aarch64-release
          path: rust/target/dist
      - name: Reverify exact accepted outputs
        env:
          ACCEPTED_RUNTIME_SHA256: ${{ needs.accept-linux-aarch64.outputs.runtime-sha256 }}
        working-directory: rust/target/dist
        run: |
          for checksum in *.sha256; do
            sha256sum -c "$checksum"
          done
          version=$(awk -F '"' '/^version =/ {print $2; exit}' ../../Cargo.toml)
          runtime="cdm-$version-aarch64-unknown-linux-gnu.tar.gz"
          test "$(sha256sum "$runtime" | awk '{print $1}')" = \
            "$ACCEPTED_RUNTIME_SHA256"
      - name: Cryptographically attest exact accepted outputs
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            rust/target/dist/*.tar.gz
            rust/target/dist/*.provenance.intoto.json
            rust/target/dist/*.sha256
          create-storage-record: ${{ github.repository_visibility == 'public' }}
      - name: Preserve Sigstore attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          test -f "$BUNDLE_PATH"
          version=$(awk -F '"' '/^version =/ {print $2; exit}' rust/Cargo.toml)
          cp "$BUNDLE_PATH" \
            "rust/target/dist/cdm-$version-aarch64-unknown-linux-gnu.sigstore.jsonl"
      - name: Upload exact accepted release outputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux-aarch64
          path: |
            rust/target/dist/*.tar.gz
            rust/target/dist/*.sha256
            rust/target/dist/*.provenance.intoto.json
            rust/target/dist/*.sigstore.jsonl
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: [compose, finalize-linux-aarch64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download accepted release outputs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-artifacts
      - name: Assemble and verify release assets
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import shutil

          version = os.environ["RELEASE_VERSION"].removeprefix("v")
          root = pathlib.Path("release-artifacts")
          destination = pathlib.Path("publish-assets")
          destination.mkdir()
          targets = (
              "aarch64-apple-darwin",
              "x86_64-unknown-linux-gnu",
              "aarch64-unknown-linux-gnu",
          )
          top_level_files = [
              path
              for artifact in root.iterdir()
              if artifact.is_dir()
              for path in artifact.iterdir()
              if path.is_file()
          ]
          selected = []
          for target in targets:
              runtime = f"cdm-{version}-{target}.tar.gz"
              provenance = f"cdm-{version}-{target}.provenance.intoto.json"
              sigstore = f"cdm-{version}-{target}.sigstore.jsonl"
              source_matches = [
                  path.name
                  for path in top_level_files
                  if path.name.startswith("cdm-vm-sources-")
                  and path.name.endswith(f"-{target}.tar.gz")
              ]
              if len(source_matches) != 1:
                  raise SystemExit(f"expected one source archive for {target}: {source_matches}")
              for name in (runtime, provenance, source_matches[0]):
                  matches = [path for path in top_level_files if path.name == name]
                  checksum_matches = [
                      path for path in top_level_files if path.name == f"{name}.sha256"
                  ]
                  if len(matches) != 1 or len(checksum_matches) != 1:
                      raise SystemExit(f"incomplete or duplicate release asset: {name}")
                  selected.extend((matches[0], checksum_matches[0]))
              signature_matches = [
                  path for path in top_level_files if path.name == sigstore
              ]
              if len(signature_matches) != 1:
                  raise SystemExit(f"missing or duplicate Sigstore bundle: {sigstore}")
              selected.extend(signature_matches)
              notarization = [
                  path for path in top_level_files
                  if path.name == f"{runtime}.notarization.json"
              ]
              if len(notarization) > 1:
                  raise SystemExit(f"duplicate notarization response for {target}")
              selected.extend(notarization)
          if len(selected) not in (21, 22):
              raise SystemExit(f"expected 21 or 22 release files, found {len(selected)}")
          for source in selected:
              target = destination / source.name
              if target.exists():
                  raise SystemExit(f"duplicate release filename: {source.name}")
              shutil.copy2(source, target)
          PY
          (
            cd publish-assets
            for checksum in *.sha256; do
              sha256sum -c "$checksum"
            done
          )
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
          else
            gh release create "$GITHUB_REF_NAME" --draft --verify-tag --generate-notes \
              --title "CDM $GITHUB_REF_NAME"
          fi
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" publish-assets/* --clobber
      - name: Publish complete release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
